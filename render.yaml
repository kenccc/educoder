services:
  - type: web
    name: educoder-web
    runtime: docker
    plan: free
    dockerfilePath: ./django/Dockerfile
    dockerContext: ./django
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: educoder.settings.prod
      - key: DJANGO_DEBUG
        value: "0"
      - key: RUN_MIGRATIONS
        value: "1"
      - key: RUN_COLLECTSTATIC
        value: "1"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: educoder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: educoder-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        value: django-db
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "1"
      - key: EXECUTION_RUNNER_URL
        sync: false
      - key: EXECUTION_RUNNER_TOKEN
        sync: false

  - type: keyvalue
    name: educoder-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: educoder-db
    plan: free
