# Production overrides. Use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  django-web:
    command: >
      uvicorn educoder.asgi:application
      --host 0.0.0.0 --port 8000 --workers 4
      --proxy-headers --forwarded-allow-ips='*'
    environment:
      DJANGO_SETTINGS_MODULE: educoder.settings.prod
      DJANGO_DEBUG: "0"
      RUN_MIGRATIONS: "1"
      RUN_COLLECTSTATIC: "1"
    volumes:
      - django_static:/app/staticfiles
      - django_media:/app/mediafiles
    restart: unless-stopped

  celery-worker:
    environment:
      DJANGO_SETTINGS_MODULE: educoder.settings.prod
      RUN_MIGRATIONS: "0"
    restart: unless-stopped
    deploy:
      replicas: 2

  celery-beat:
    environment:
      DJANGO_SETTINGS_MODULE: educoder.settings.prod
      RUN_MIGRATIONS: "0"
    restart: unless-stopped

  execution-runner:
    restart: unless-stopped
    deploy:
      replicas: 2

  nginx:
    image: nginx:1.27-alpine
    depends_on: [django-web]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx.conf:/etc/nginx/nginx.conf:ro
      - django_static:/var/www/static:ro
      - django_media:/var/www/media:ro
    networks: [backend]
    restart: unless-stopped
